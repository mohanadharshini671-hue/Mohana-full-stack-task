<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Colorful Menu</title>

<style>
    body{
        font-family: Arial, sans-serif;
        background: #f4f6f9;
        padding: 30px;
    }

    .menu-btn{
        background: #4f46e5;
        color: white;
        border: none;
        padding: 12px 20px;
        font-size: 18px;
        border-radius: 10px;
        cursor: pointer;
        box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    }

    .menu-btn:hover{
        background: #3730a3;
    }

    .menu{
        display: none;
        width: 220px;
        margin-top: 12px;
        border-radius: 12px;
        overflow: hidden;
        box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    }

    .menu.show{
        display: block;
    }

    .menu a{
        display: block;
        padding: 14px;
        text-decoration: none;
        color: white;
        font-size: 16px;
        transition: 0.3s;
    }

    .home{
        background: #22c55e;
    }

    .about{
        background: #3b82f6;
    }

    .contact{
        background: #f59e0b;
    }

    .settings{
        background: #ef4444;
    }

    .menu a:hover{
        filter: brightness(85%);
        padding-left: 25px;
    }
</style>
</head>

<body>

<button class="menu-btn" onclick="toggleMenu()">☰ Menu</button>

<div id="menu" class="menu">
    <a href="#" class="home">🏠 Home</a>
    <a href="#" class="about">ℹ️ About</a>
    <a href="#" class="contact">📞 Contact</a>
    <a href="#" class="settings">⚙️ Settings</a>
</div>

<script>
function toggleMenu(){
    document.getElementById("menu").classList.toggle("show");
}
</script>

</body>
</html>
