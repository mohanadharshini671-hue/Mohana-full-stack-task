<!DOCTYPE html>
<html>
<head>
<title>Dropdown Menu</title>

<style>
.menu{
    list-style:none;
    margin:0;
    padding:0;
    background:#333;
    width:200px;
}

.menu li{
    position:relative;
}

.menu a{
    display:block;
    color:white;
    padding:10px;
    text-decoration:none;
}

.menu a:hover{
    background:green;
}

/* dropdown */
.submenu{
    display:none;
    list-style:none;
    padding:0;
    background:#555;
}

.menu li:hover .submenu{
    display:block;
}

.submenu a{
    padding-left:30px;
}
</style>

</head>

<body>

<ul class="menu">
    <li><a href="#">Home</a></li>

    <li>
        <a href="#">Services</a>
        <ul class="submenu">
            <li><a href="#">Web Design</a></li>
            <li><a href="#">App Design</a></li>
            <li><a href="#">SEO</a></li>
        </ul>
    </li>

    <li><a href="#">About</a></li>
    <li><a href="#">Contact</a></li>
</ul>

</body>
</html>
